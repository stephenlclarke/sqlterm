# SonarCloud project key for the Go repository.
sonar.projectKey=stephenlclarke_sqlterm
sonar.projectName=sqlterm
sonar.projectVersion=0.1.0
sonar.projectDescription=Interactive SQL terminal using local ODBC connection profiles.
sonar.organization=stephenlclarke
sonar.sourceEncoding=UTF-8
sonar.host.url=https://sonarcloud.io

sonar.language=go
sonar.sources=.
sonar.tests=.
sonar.inclusions=**/*.go
sonar.exclusions=**/*_test.go
sonar.test.inclusions=**/*_test.go
sonar.cpd.exclusions=**/*_test.go

sonar.junit.reportPaths=reports/unit-test-report.xml
sonar.go.coverage.reportPaths=reports/coverage.out
